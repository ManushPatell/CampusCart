services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: overlay
